            format: int64
        skill_ids:
          type: array
          items:
            type: integer
            format: int64
        child_ids:
          type: array
          items:
            type: integer
            format: int64

    UpdateAgentReq:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        system_prompt:
          type: string
        provider_id:
          type: integer
          format: int64
        model_name:
          type: string
        temperature:
          type: number
          format: double
        max_tokens:
          type: integer
        timeout:
          type: integer
        tool_ids:
          type: array
          items:
            type: integer
