    # ===== Skill =====
    Skill:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        instruction:
          type: string
          description: 注入到 system prompt 的技能指令
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tools:
          type: array
