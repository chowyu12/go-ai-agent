    CreateSkillReq:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        instruction:
          type: string
        tool_ids:
          type: array
          items:
            type: integer
            format: int64

    UpdateSkillReq:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        instruction:
          type: string
        tool_ids:
          type: array
          items:
            type: integer
            format: int64

    SkillPageData:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
        total:
          type: integer
          format: int64

    # ===== Chat =====
    ChatFile:
      type: object
      required: [type, transfer_method]
      properties:
        type:
          type: string
          enum: [document, image, audio, video, custom]
          description: 文件类型
        transfer_method:
          type: string
          enum: [remote_url, local_file]
          description: 传递方式
        url:
          type: string
          description: 文件地址（transfer_method=remote_url 时）
        upload_file_id:
          type: string
          description: 上传文件 ID（transfer_method=local_file 时）

    ChatRequest:
      type: object
      required: [agent_id, message]
      properties:
        agent_id:
          type: string
          description: Agent UUID
        conversation_id:
          type: string
          description: 会话 UUID（留空则创建新会话）
        user_id:
          type: string
          description: 用户标识
        message:
          type: string
          description: 用户消息
        stream:
          type: boolean
          default: false
        files:
          type: array
          items:
            $ref: "#/components/schemas/ChatFile"
          description: 附带的文件列表

    ChatResponse:
      type: object
      properties:
        conversation_id:
          type: string
        message:
          type: string
        tokens_used:
          type: integer
        steps:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionStep"

    StreamChunk:
      type: object
      properties:
        conversation_id:
          type: string
        delta:
          type: string
          description: 增量文本
        done:
          type: boolean
        step:
          $ref: "#/components/schemas/ExecutionStep"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionStep"

    Conversation:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
        agent_id:
          type: integer
          format: int64
        user_id:
          type: string
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ConversationPageData:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
        total:
          type: integer
          format: int64

    Message:
      type: object
      properties:
        id:
          type: integer
          format: int64
        conversation_id:
          type: integer
          format: int64
        role:
          type: string
          enum: [user, assistant, system, tool]
        content:
          type: string
        tool_calls:
          type: object
          description: Function calling 信息
        tool_call_id:
          type: string
        tokens_used:
          type: integer
        parent_step_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        steps:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionStep"
          description: 关联的执行步骤（需 with_steps=true）
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileInfo"
          description: 关联的文件附件

    ExecutionStep:
      type: object
      properties:
        id:
          type: integer
          format: int64
        message_id:
          type: integer
          format: int64
        conversation_id:
          type: integer
          format: int64
        step_order:
          type: integer
        step_type:
          type: string
          enum: [llm_call, tool_call, agent_call, skill_match]
        name:
          type: string
        input:
          type: string
        output:
          type: string
        status:
          type: string
          enum: [success, error, pending]
        error:
          type: string
        duration_ms:
          type: integer
        tokens_used:
          type: integer
        metadata:
          $ref: "#/components/schemas/StepMetadata"
        created_at:
          type: string
          format: date-time

    StepMetadata:
      type: object
      properties:
        provider:
          type: string
        model:
          type: string
        temperature:
          type: number
          format: double
        tool_name:
          type: string
        skill_name:
          type: string
        skill_tools:
          type: array
          items:
            type: string
        agent_uuid:
          type: string
        agent_name:
          type: string

    # ===== File =====
    FileInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
        conversation_id:
          type: integer
          format: int64
        message_id:
          type: integer
          format: int64
        filename:
          type: string
        content_type:
          type: string
        file_size:
          type: integer
          format: int64
        file_type:
          type: string
          enum: [text, image, document]
        text_content:
          type: string
          description: 提取的文本内容（非图片文件）
        created_at:
          type: string
          format: date-time
