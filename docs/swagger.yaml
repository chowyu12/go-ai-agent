          format: int64

    # ===== Tool =====
    Tool:
      type: object
      properties:
        id:
          type: integer
          format: int64
        uuid:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        function_def:
          type: object
          description: OpenAI Function Calling 格式的函数定义
        handler_type:
          type: string
          enum: [builtin, http, script, command]
        handler_config:
          type: object
          description: 处理器配置（HTTP/Command 等）
        enabled:
          type: boolean
        timeout:
          type: integer
          description: 工具执行超时（秒），默认 30
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateToolReq:
      type: object
      required: [name, description, handler_type]
      properties:
        name:
          type: string
        description:
          type: string
        function_def:
          type: object
        handler_type:
          type: string
          enum: [builtin, http, script, command]
        handler_config:
          type: object
        timeout:
          type: integer
          default: 30

    UpdateToolReq:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        function_def:
          type: object
        handler_type:
          type: string
          enum: [builtin, http, script, command]
        handler_config:
          type: object
        enabled:
          type: boolean
        timeout:
          type: integer

    ToolPageData:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/Tool"
